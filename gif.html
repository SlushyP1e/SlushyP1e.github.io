<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIF Gallery | SlushyPie</title>
    <meta name="description" content="SlushyPie's collection of GIFs." />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://slushypie.com/gif.html" />
    <meta property="og:title" content="GIF Gallery | SlushyPie" />
    <meta property="og:description" content="SlushyPie's collection of GIFs." />
    <meta property="og:image" content="https://slushypie.com/SlushyPies.png" />
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:image" content="https://slushypie.com/SlushyPies.png" />

    <link rel="icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta name="theme-color" content="#121212" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" />

    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="theme.css" />
  </head>

  <body>
    <div class="bg-mascot" aria-hidden="true">
      <img id="bg-layer" src="SlushyPieBannerTransparent.webp" alt="" loading="lazy" onerror="this.src='SlushyPieBannerTransparent.png'" />
    </div>

    <a href="index.html" aria-label="Back Home" class="float-btn tl" title="Back Home">
      <i data-lucide="arrow-left"></i>
    </a>

    <main class="wrap">
      <div class="page-header">
        <div>
          <a href="index.html" class="back-btn"><i data-lucide="arrow-left" style="width:16px;height:16px;"></i> Back to Home</a>
          <h1 class="page-title"><span class="grad-text">GIF</span> Gallery</h1>
          <p class="mono muted" style="margin-top:10px;font-size:0.85rem;">&gt; My collection of gifs. Click to view and/or copy.</p>
        </div>
      </div>

      <div id="gif-grid" class="gif-grid"></div>

      <div id="empty-state" class="bento-card empty-state" style="display:none;">
        <i data-lucide="film"></i>
        <p class="heading-font" style="font-size:1.1rem;color:var(--text-dim);">No GIFs found in the /gif folder yet!</p>
      </div>

      <div class="footer">&copy; <span id="year">2025</span> SlushyPie <span class="heart">♡</span> made with love</div>
    </main>

    <!-- Modal -->
    <div id="modal" class="modal" aria-hidden="true">
      <div id="modal-backdrop" class="modal-backdrop"></div>
      <div id="modal-content" class="modal-content">
        <button id="close-modal-btn" class="modal-close"><i data-lucide="x"></i></button>
        <div class="modal-frame"><img id="modal-img" src="" alt="" /></div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">
      <i data-lucide="check-circle"></i>
      <span class="mono">LINK COPIED!</span>
    </div>

    <script>
      // Add new gifs here: drop the file in /gif and list its filename below.
      const GIF_FILES = [
        'slushypie-vrchat.gif',
        'slushypie-eat.gif',
        'SlushyPieMyBeloved.gif',
        'chompy.gif',
        'dap.gif',
      ];
      // Resolved relative to the page so it works on any host (incl. GitHub Pages subpaths)
      const BASE_URL = new URL('gif/', window.location.href).href;

      const els = {
        grid: document.getElementById('gif-grid'),
        empty: document.getElementById('empty-state'),
        modal: document.getElementById('modal'),
        backdrop: document.getElementById('modal-backdrop'),
        content: document.getElementById('modal-content'),
        modalImg: document.getElementById('modal-img'),
        closeBtn: document.getElementById('close-modal-btn'),
        toast: document.getElementById('toast'),
        bg: document.getElementById('bg-layer'),
      };

      const init = () => { window.lucide && lucide.createIcons(); renderGrid(); setupEventListeners(); animLoop(); };

      const renderGrid = () => {
        if (!GIF_FILES.length) { els.empty.style.display = 'block'; return; }
        const observer = new IntersectionObserver((entries, obs) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const img = entry.target;
              if (img.dataset.src) { img.src = img.dataset.src; img.removeAttribute('data-src'); }
              obs.unobserve(img);
            }
          });
        }, { rootMargin: '200px' });

        GIF_FILES.forEach((filename, i) => {
          const url = BASE_URL + filename;
          const card = document.createElement('div');
          card.className = 'gallery-card fade-in-up';
          card.style.animationDelay = `${i * 0.08}s`;
          card.innerHTML = `
            <div class="gif-thumb js-view-trigger" data-url="${url}" data-name="${filename}">
              <img data-src="${url}" src="" alt="${filename}" />
              <div class="overlay"><div class="zoom"><i data-lucide="maximize-2"></i></div></div>
            </div>
            <div class="gif-meta">
              <span class="gif-name" title="${filename}">${filename}</span>
              <button class="gif-copy js-copy-trigger" title="Copy Link" data-url="${url}"><i data-lucide="link"></i></button>
            </div>`;
          els.grid.appendChild(card);
          const lazyImg = card.querySelector('img[data-src]');
          if (lazyImg) observer.observe(lazyImg);
        });
        window.lucide && lucide.createIcons();
      };

      const setupEventListeners = () => {
        els.grid.addEventListener('click', (e) => {
          const viewTrigger = e.target.closest('.js-view-trigger');
          const copyTrigger = e.target.closest('.js-copy-trigger');
          if (copyTrigger) { handleCopy(copyTrigger.dataset.url); }
          else if (viewTrigger) { openModal(viewTrigger.dataset.url, viewTrigger.dataset.name); }
        });
        els.closeBtn.addEventListener('click', closeModal);
        els.backdrop.addEventListener('click', closeModal);
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && els.modal.classList.contains('open')) closeModal();
        });
      };

      const handleCopy = async (text) => {
        try {
          await navigator.clipboard.writeText(text);
          showToast();
          if (window.playSlushySound) window.playSlushySound('success');
        } catch (err) { console.error('Failed to copy: ', err); }
      };

      const showToast = () => {
        els.toast.classList.add('show', 'toast-anim');
        setTimeout(() => { els.toast.classList.remove('show', 'toast-anim'); }, 2000);
      };

      const openModal = (url, name) => {
        els.modalImg.src = url; els.modalImg.alt = name;
        els.modal.classList.add('open');
        document.body.style.overflow = 'hidden';
        requestAnimationFrame(() => {
          els.backdrop.classList.add('in');
          els.content.classList.add('in');
        });
      };

      const closeModal = () => {
        els.backdrop.classList.remove('in');
        els.content.classList.remove('in');
        setTimeout(() => {
          els.modal.classList.remove('open');
          document.body.style.overflow = 'auto';
          els.modalImg.src = '';
        }, 200);
      };

      // Background parallax
      let mouse = { x: 0, y: 0 }, current = { x: 0, y: 0 }, t = 0;
      document.addEventListener('mousemove', (e) => {
        mouse.x = (e.clientX / window.innerWidth - 0.5) * 20;
        mouse.y = (e.clientY / window.innerHeight - 0.5) * 20;
      });
      const animLoop = () => {
        t += 0.005;
        const tx = Math.sin(t) * 15 + mouse.x;
        const ty = Math.sin(t * 0.8) * 10 + mouse.y;
        current.x += (tx - current.x) * 0.05;
        current.y += (ty - current.y) * 0.05;
        if (els.bg) els.bg.style.transform = `translate3d(${current.x}px, ${current.y}px, 0) scale(1.1)`;
        requestAnimationFrame(animLoop);
      };

      window.addEventListener('load', () => {
        init();
        document.getElementById('year').textContent = new Date().getFullYear();
      });
    </script>
  </body>
</html>
